<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | River Rush Company </title>
    <meta name="author" content="Joshua Cabaltica">
    <meta name="description" content="a multi-page website project about River Rush rafting company, specifically the contact us website part">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-rapids-trees.jpg" alt="WRR Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="intro">
            <p id="head"> River Rush Company</p>
            <p>123 Main River Street</p>
            <p> Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info.@whitewater.com</p>
        </div>
        <form>
            <div class="info">
                <div class="name">
                    <label for="name">Name:</label>
                    <input id="name" type="text" name="name" placeholder="placeholder">
                </div>
                <div class="email">
                    <label for="email">Email:</label>
                    <input id="email" type="text" name="email" placeholder="placeholder" >
                </div>
                <div class="radio">
                    <div>
                       <p>Message Purpose</p>
                    </div>
                    <div class="sradio">
                        <div class="a">
                            <label for="inquiry"> General inquiry </label>
                            <input id="inquiry" name="radio" type="radio">
                        </div>
                        <div class="a">
                            <label for="reserve">Reservation Question</label>
                            <input id="reserve" type="radio" name="radio">
                        </div>
                        <div class="a">
                            <label for="suggest">Website Suggestion</label>
                            <input id="suggest" type="radio" name="radio">
                        </div>
                    </div>
                </div>
                <div class="message">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" placeholder="type here"></textarea>
                </div>
                <div class="checkbox">
                    <label for="sub">Please Subscribe me to the monthly newsletter</label>
                    <input id="sub" type="checkbox" name="sub">
                </div>
                <div class="button">
                    <button type="submit">Get in Touch!</button>
                </div>
            </div>
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d87269.59635462714!2d120.4908119810506!3d14.836046274958006!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sph!4v1775132921243!5m2!1sen!2sph"
                  width="400" height="350" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </form>

        <section>
            <p>We Are Here to Serve You</p>
            <div class="figs">
                <figure>
                    <img src="./images/employee.jpg" alt="employee">
                    <figcaption>Employee 1</figcaption>
                </figure>
                <figure>
                    <img src="./images/employee1.jpg" alt="employee1">
                    <figcaption>Employee 2</figcaption>
                </figure>
                <figure>
                    <img src="./images/employee2.jpg" alt="employee2">
                    <figcaption>Employee 3</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 | River Rush | Joshua Cabaltica</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="facebook logo">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram.png" alt="instagram logo">
            </a>

            <a href="https://www.youtube.com">
                <img src="images/youtube.png" alt="youtube logo">
            </a>
        </nav>
    </footer>
</body>

</html>
