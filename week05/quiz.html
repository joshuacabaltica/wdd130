<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | Quiz</title>
    <link rel="stylesheet" href="./styles/quiz.css">

</head>

<body>
    <header>
        <h1>Basic HTML and CSS Quiz</h1>
    </header>
    <form>
        <div class="q1">

            <label for="q1">1. What does the acronym CSS stands for? </label>
            <input id="q1" type="textarea" name="acronym">
        </div>
        
        <div class="q2">
            <label for="q2">2. How are id and class attributes selected in CSS? </label>
            <textarea id="q2" type="text" name="selectors"></textarea>
        </div>
        
        <div class="q3">
            <label for="q3">3. Which of the following is a valid CSS comment? </label>
            <select id="q3" type="text" name="comment">
                <option value="1">123</option>
                <option value="2">123</option>
                <option value="3">123</option>
            </select>
        </div>
        <div class="q4  ">
            <label for="q4">4. What is the bottom margin given this declaration? </label>
            <p> margin: 10px 5px 15px;</p>
            <input id="q4" type="text" name="margin">
        </div>
        
        <button type="submit">Submit Quiz</button>
    </form>

</body>

</html>
