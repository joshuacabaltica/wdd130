<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="./styles/poll-form.css">
</head
<body>
    <header>
        <h1> WDD 130 | HTML Form - User Poll</h1>
    </header>
    <form>
        <fieldset>
            <legend>Contact Information</legend>
            <div class="form-item column2">
                <label for="fullname">Full name:</label>
                <input type="text" id="fullname" name="user-fullname" required>
            </div>
            <div class="form-item column2">
                <label for="Email-address">Email:</label>
                <input type="text" id="Email-address" name="user-email" required>
            </div>
        </fieldset>
        <fieldset id="2">
                <legend>Questions</legend>
                <div>
                    <label for="Internet Browser">What is your favorite internet browser</label>
                    <select type="text" id="Internet Browser" name="user-internet">
                        <option value="Chrome">Chrome</option>
                        <option value="Safari">Safari</option>
                        <option value="Edge">Edge</option>
                        <option value="Brave">Brave</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div>
                    <label for="pet">Do you have a household pet?</label>
                    <input id="pet" type="checkbox" name="pet">
                </div>
                
                <div>
                    <label for="feedback">List the places you have lived</label>
                    <textarea id="feedback" name="feedback" rows="4" placeholder="Balanga City, Bataan"></textarea>
                </div>
              
        </fieldset>
    
        
   
    
        <button type="submit">Submit Poll</button>
    </form>
    <footer>
        <p>©2026 | HTML Form - User Poll Activity | Joshua Cabaltica</p>
    </footer>
</body>
</html>
